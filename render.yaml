# Render Blueprint — CuziCam AI microservice
# Dashboard → Blueprints → connect this repo, OR set commands manually (see ai-service/RENDER.md).
#
# If Build Command is still the backend npm line, ai-service/package.json bridges it until you fix the dashboard.

services:
  - type: web
    name: cuzicam-ai-service
    runtime: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SHARED_SECRET
        sync: false
